name: my-music-integration-tests

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: my-music
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d my-music"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: gitea.home/silvas/my-music:${VERSION:-dev}
    environment:
      MYMUSIC_HEADER_ID_ENABLED: "1"
      ConnectionStrings__Postgres: "Host=db;Port=5432;Username=postgres;Password=postgres;Database=my-music"
      OpenTelemetry__Enabled: "true"
      OpenTelemetry__Protocol: "http/protobuf"
      OpenTelemetry__Endpoint: "http://otelite:4318"
      Logging__LogLevel__MyMusic: "Debug"
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      otelite: host-gateway

  client:
    image: gitea.home/silvas/my-music-ui:${VERSION:-dev}

  caddy:
    image: caddy:2
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    depends_on:
      - server
      - client
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 5s
      timeout: 5s
      retries: 5

  integration-tests:
    image: gitea.home/silvas/my-music-integrations-tests:${VERSION:-dev}
    environment:
      OpenTelemetry__Enabled: "true"
      OpenTelemetry__Protocol: "http/protobuf"
      OpenTelemetry__Endpoint: "http://otelite:4318"
    depends_on:
      db:
        condition: service_healthy
      caddy:
        condition: service_healthy
    extra_hosts:
      otelite: host-gateway

volumes:
  postgres-data: {}
  otelite-data: {}

configs:
  caddyfile:
    content: |
      :80 {
        handle_path /api/* {
          reverse_proxy server:8080
        }

        handle /* {
          reverse_proxy client:8080
        }
      }
